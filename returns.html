<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rental Returns</title>
  <link rel="stylesheet" href="/nav.css">
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; padding: 72px 16px 24px; }
    .wrap { max-width: 980px; margin: 0 auto; }
    h1 { margin: 0 0 12px; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 12px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; }
    label { display: block; font-size: 12px; margin-bottom: 6px; color: #333; }
    input { padding: 10px; border: 1px solid #ccc; border-radius: 8px; min-width: 240px; }
    select { padding: 10px; border: 1px solid #ccc; border-radius: 8px; min-width: 240px; }
    button { padding: 10px 12px; border: 1px solid #333; background: #fff; border-radius: 8px; cursor: pointer; }
    button.primary { background: #111; color: #fff; border-color: #111; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #eee; }
    th { font-size: 12px; color: #444; text-transform: uppercase; letter-spacing: .03em; }
    .muted { color: #666; font-size: 12px; }
    .toast { margin-top: 10px; font-size: 13px; }
    .right { margin-left: auto; }
    .actions { white-space: nowrap; display: flex; gap: 8px; align-items: center; }

    /* dialog styling (updated to prevent overflow) */
    dialog {
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 14px;
      width: min(520px, calc(100vw - 32px));
      max-width: 520px;
    }
    dialog::backdrop { background: rgba(0,0,0,0.35); }
    dialog form { box-sizing: border-box; width: 100%; }
    dialog .row { width: 100%; }
    dialog input,
    dialog textarea {
      box-sizing: border-box;
      width: 100%;
      min-width: 0;
    }
    textarea { font-family: inherit; }
  </style>
  <script src="/nav.js" defer></script>
</head>
<body>
  <div class="wrap">
    <h1>Rental Returns</h1>
    <div class="card">
      <div class="row">
        <div>
          <label for="name">Signer name (first, last, or both)</label>
          <input id="name" type="text" placeholder="e.g., Gary Hohl" />
        </div>
        <div>
          <label for="startDate">Signed start date</label>
          <input id="startDate" type="date" />
        </div>
        <div>
          <label for="endDate">Signed end date</label>
          <input id="endDate" type="date" />
        </div>

        <div>
          <label for="statusFilter">Filter Results</label>
          <select id="statusFilter">
            <option value="ALL">All</option>
            <option value="OUT" selected>OUT</option>
            <option value="RETURNED">RETURNED</option>
          </select>
        </div>

        <button id="clearBtn">Clear</button>
        <span class="right muted" id="count"></span>
      </div>

      <table>
        <thead id="thead">
          <tr>
            <th>Signed</th>
            <th>Signer</th>
            <th>Agreement</th>
            <th>Status</th>
            <th>Returned</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="6" class="muted">Adjust filters to see rentals.</td></tr>
        </tbody>
      </table>

      <div class="row" style="margin-top: 12px;">
        <div>
          <label for="exportFrom">Export from</label>
          <input id="exportFrom" type="date" />
        </div>
        <div>
          <label for="exportTo">Export to</label>
          <input id="exportTo" type="date" />
        </div>
        <button id="exportBtn">Export returns CSV</button>
        <span class="toast" id="toast"></span>
      </div>
    </div>
  </div>

  <!-- Return dialog -->
  <dialog id="returnDialog">
    <form method="dialog" id="returnForm">
      <h3 style="margin:0 0 10px;">Log return</h3>

      <div class="row">
        <div style="flex:1;">
          <label for="returnDate">Return date</label>
          <input id="returnDate" type="date" />
        </div>
      </div>

      <div style="margin-top:10px;">
        <label for="returnComment">Comment (equipment received)</label>
        <textarea id="returnComment" rows="4"
          placeholder="e.g., 1x skis, 1x poles, 1x boots"
          style="padding:10px;border:1px solid #ccc;border-radius:8px;resize:vertical;"></textarea>
      </div>

      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:12px;">
        <button type="button" id="cancelReturnBtn">Cancel</button>
        <button type="submit" class="primary" id="confirmReturnBtn">Confirm return</button>
      </div>
    </form>
  </dialog>

  <!-- Note dialog -->
  <dialog id="noteDialog">
    <form method="dialog" id="noteForm">
      <h3 style="margin:0 0 10px;">Note</h3>

      <div style="margin-top:10px;">
        <label for="noteText">Comment / note</label>
        <textarea id="noteText" rows="5"
          placeholder="Add or edit a note for this agreement"
          style="padding:10px;border:1px solid #ccc;border-radius:8px;resize:vertical;"></textarea>
      </div>

      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:12px;">
        <button type="button" id="cancelNoteBtn">Cancel</button>
        <button type="submit" class="primary" id="saveNoteBtn">Save note</button>
      </div>
    </form>
  </dialog>

<script>
  const el = (id) => document.getElementById(id);

  function setToast(msg) { el("toast").textContent = msg || ""; }

  function fmtDate(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleString();
    } catch { return iso; }
  }

  function toYMD(d) {
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    return `${yyyy}-${mm}-${dd}`;
  }

  function setDefaultDateRange() {
    const today = new Date();
    const end = toYMD(today);
    const startD = new Date(today);
    startD.setDate(startD.getDate() - 7);
    const start = toYMD(startD);

    el("startDate").value = start;
    el("endDate").value = end;
  }

  // Debounced auto-search on filter changes
  let searchTimer = null;
  function scheduleSearch() {
    if (searchTimer) clearTimeout(searchTimer);
    searchTimer = setTimeout(() => search(), 250);
  }

  async function openReturnDialog(defaultDateYMD) {
    return new Promise((resolve) => {
      const dlg = el("returnDialog");
      const cancelBtn = el("cancelReturnBtn");
      const form = el("returnForm");

      el("returnDate").value = defaultDateYMD || "";
      el("returnComment").value = "";

      function cleanup(result) {
        cancelBtn.removeEventListener("click", onCancel);
        form.removeEventListener("submit", onSubmit);
        if (dlg.open) dlg.close();
        resolve(result);
      }

      function onCancel() { cleanup(null); }

      function onSubmit(e) {
        e.preventDefault();
        const returnDate = el("returnDate").value;
        const comment = el("returnComment").value.trim();
        if (!returnDate) {
          setToast("Return date is required.");
          return;
        }
        cleanup({ returnDate, comment });
      }

      cancelBtn.addEventListener("click", onCancel);
      form.addEventListener("submit", onSubmit);

      dlg.showModal();
    });
  }

  async function openNoteDialog(existingNote) {
    return new Promise((resolve) => {
      const dlg = el("noteDialog");
      const cancelBtn = el("cancelNoteBtn");
      const form = el("noteForm");

      el("noteText").value = existingNote || "";

      function cleanup(result) {
        cancelBtn.removeEventListener("click", onCancel);
        form.removeEventListener("submit", onSubmit);
        if (dlg.open) dlg.close();
        resolve(result);
      }

      function onCancel() { cleanup(null); }

      function onSubmit(e) {
        e.preventDefault();
        cleanup({ note: el("noteText").value });
      }

      cancelBtn.addEventListener("click", onCancel);
      form.addEventListener("submit", onSubmit);

      dlg.showModal();
    });
  }

  let inFlight = null;

  async function search() {
    // Cancel any previous request (best-effort)
    if (inFlight && inFlight.abort) inFlight.abort();
    const controller = new AbortController();
    inFlight = controller;

    setToast("");

    const name = el("name").value.trim();
    const startDate = el("startDate").value;
    const endDate = el("endDate").value;
    const statusFilter = el("statusFilter").value;

    const qs = new URLSearchParams();
    if (name) qs.set("name", name);
    if (startDate) qs.set("startDate", startDate);
    if (endDate) qs.set("endDate", endDate);
    if (statusFilter) qs.set("status", statusFilter);

    const tbody = el("rows");
    tbody.innerHTML = `<tr><td colspan="6" class="muted">Loading…</td></tr>`;

    try {
      const r = await fetch(`/api/rentals-outstanding?${qs.toString()}`, { signal: controller.signal });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || "Search failed");

      const rentals = data.rentals || [];
      el("count").textContent = rentals.length ? `${rentals.length} records` : "";

      if (!rentals.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="muted">No records found.</td></tr>`;
        return;
      }

      tbody.innerHTML = "";
      for (const a of rentals) {
        const tr = document.createElement("tr");
        const signer = `${a.signer_first} ${a.signer_last}`.trim();

        const status = (a.status || "").toString();
        const returnedAt = a.returned_at ? fmtDate(a.returned_at) : "";
        const canReturn = status === "OUT";

        const note = (a.note || "").toString();
        const safeNote = note.replace(/"/g, "&quot;");

        tr.innerHTML = `
          <td>${fmtDate(a.signed_at)}</td>
          <td>${signer}</td>
          <td>${a.id}</td>
          <td>${status}</td>
          <td>${returnedAt}</td>
          <td class="actions">
            ${canReturn ? `<button data-action="return" data-id="${a.id}" class="primary">Return</button>` : `<span class="muted">—</span>`}
            <button data-action="note" data-id="${a.id}" data-note="${safeNote}">Note</button>
          </td>
        `;
        tbody.appendChild(tr);
      }

      tbody.querySelectorAll('button[data-action="return"]').forEach((btn) => {
        btn.addEventListener("click", () => doReturn(btn));
      });
      tbody.querySelectorAll('button[data-action="note"]').forEach((btn) => {
        btn.addEventListener("click", () => doNote(btn));
      });
    } catch (e) {
      if (e.name === "AbortError") return; // expected when typing quickly
      tbody.innerHTML = `<tr><td colspan="6" class="muted">${e.message}</td></tr>`;
    }
  }

  async function doReturn(btn) {
    setToast("");
    const agreementId = Number(btn.getAttribute("data-id"));
    if (!agreementId) return;

    const todayYMD = toYMD(new Date());
    const result = await openReturnDialog(todayYMD);
    if (!result) return;

    btn.disabled = true;
    try {
      const r = await fetch("/api/rentals-return", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          agreementId,
          returnDate: result.returnDate,
          comment: result.comment || null,
          returnedBy: "kiosk"
        })
      });

      const data = await r.json();
      if (!r.ok) throw new Error(data.error || "Return failed");

      setToast(`Return logged for agreement #${agreementId}.`);
      await search();
    } catch (e) {
      setToast(e.message);
      btn.disabled = false;
    }
  }

  async function doNote(btn) {
    setToast("");
    const agreementId = Number(btn.getAttribute("data-id"));
    if (!agreementId) return;

    const existing = btn.getAttribute("data-note") || "";
    const result = await openNoteDialog(existing);
    if (!result) return;

    btn.disabled = true;
    try {
      const r = await fetch("/api/rentals-note", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ agreementId, note: result.note })
      });

      const data = await r.json();
      if (!r.ok) throw new Error(data.error || "Save note failed");

      const tr = btn.closest("tr");
      const newNote = (data.agreement.note || "").toString();
      const safeNewNote = newNote.replace(/"/g, "&quot;");
      tr.querySelectorAll('button[data-action="note"]').forEach((b) => {
        b.setAttribute("data-note", safeNewNote);
      });

      setToast(`Note saved for agreement #${agreementId}.`);
    } catch (e) {
      setToast(e.message);
    } finally {
      btn.disabled = false;
    }
  }

  function exportCsv() {
    setToast("");
    const from = el("exportFrom").value;
    const to = el("exportTo").value;
    const qs = new URLSearchParams();
    if (from) qs.set("from", from);
    if (to) qs.set("to", to);
    window.location.href = `/api/returns-export?${qs.toString()}`;
  }

  // Automatic search on filter changes
  el("name").addEventListener("input", scheduleSearch);
  el("startDate").addEventListener("change", scheduleSearch);
  el("endDate").addEventListener("change", scheduleSearch);
  el("statusFilter").addEventListener("change", scheduleSearch);

  el("clearBtn").addEventListener("click", () => {
    el("name").value = "";
    setDefaultDateRange();
    el("statusFilter").value = "OUT";

    el("rows").innerHTML = `<tr><td colspan="6" class="muted">Adjust filters to see rentals.</td></tr>`;
    el("count").textContent = "";
    setToast("");
    search();
  });

  el("exportBtn").addEventListener("click", exportCsv);

  document.addEventListener("DOMContentLoaded", () => {
    setDefaultDateRange();
    search();
  });
</script>
</body>
</html>
